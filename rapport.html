<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Rapport de contrôle — Koulway</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
<style>
  :root {
    --paper: #f2f4f3; --card: #ffffff; --ink: #1e2528; --muted: #5c6a6e;
    --line: #dde3e2; --accent: #0e6b63; --accent-soft: #e3efed;
    --ok: #1f8a4c; --ok-soft: #e4f2e9; --nc: #d9822b; --nc-soft: #f9eedd;
    --crit: #c6362e; --crit-soft: #f9e5e3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #171c1e; --card: #20272a; --ink: #e8ecec; --muted: #9aa8ab;
      --line: #333d40; --accent: #4db6ab; --accent-soft: #1d3331;
      --ok: #4cc07a; --ok-soft: #1e3327; --nc: #e59a4d; --nc-soft: #3a2d1c;
      --crit: #e26058; --crit-soft: #3b211f;
    }
  }
  @media print {
    :root {
      --paper: #ffffff; --card: #ffffff; --ink: #111517; --muted: #4a5558;
      --line: #c9d1d0; --accent: #0e6b63; --accent-soft: #eef4f3;
      --ok: #1f8a4c; --ok-soft: #eef6f1; --nc: #b06a1e; --nc-soft: #faf2e5;
      --crit: #c6362e; --crit-soft: #faeeec;
    }
    .no-print { display: none !important; }
    body { padding: 0; }
    .poste, .action-card, .group { break-inside: avoid; }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  html, body { margin: 0; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 15.5px; line-height: 1.55;
    padding: 10px 10px calc(84px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 640px; margin: 0 auto; }

  section.card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; margin: 12px 0; overflow: hidden;
  }
  .sec-head { padding: 14px 16px 2px; }
  .sec-head h2 { font-size: 16.5px; margin: 0; letter-spacing: -0.01em; }
  .pad { padding: 6px 16px 14px; }
  .pad p { margin: 8px 0; }

  /* ── carte de tête ── */
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent);
  }
  h1 { font-size: 21px; margin: 3px 0 4px; letter-spacing: -0.01em; text-wrap: balance; }
  .meta { color: var(--muted); font-size: 13.5px; margin: 0; }
  .score-row {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 16px 10px;
  }
  .score-row .num {
    font-size: clamp(44px, 13vw, 56px); font-weight: 800; line-height: 1;
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  }
  .score-row .num small { font-size: 17px; color: var(--muted); font-weight: 600; }
  .grade {
    display: inline-block; padding: 4px 16px; border-radius: 999px;
    font-weight: 800; font-size: 19px; color: #fff; background: var(--muted);
  }
  .g-a { background: var(--ok); } .g-b { background: var(--accent); }
  .g-c { background: var(--nc); } .g-d { background: var(--crit); }
  .glabel { font-size: 13.5px; color: var(--muted); margin-top: 6px; }
  .dist {
    display: flex; height: 10px; border-radius: 5px; overflow: hidden;
    margin: 2px 16px 10px; background: var(--line);
  }
  .dist span { display: block; height: 100%; }
  .stats {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 16px 16px; font-size: 12.5px; font-variant-numeric: tabular-nums;
  }
  .stats span {
    padding: 3px 10px; border-radius: 999px;
    background: var(--paper); border: 1px solid var(--line); white-space: nowrap;
  }
  .stats .s-ok { color: var(--ok); border-color: var(--ok); }
  .stats .s-nc { color: var(--nc); border-color: var(--nc); }
  .stats .s-crit { color: var(--crit); border-color: var(--crit); font-weight: 700; }

  /* ── synthèse ── */
  .kv { font-weight: 600; }
  .kv.good { color: var(--ok); }
  .kv.warn { color: var(--nc); }

  /* ── groupes par poste (critiques, NC, observations) ── */
  .glist { padding: 2px 16px 14px; }
  .gname {
    font-size: 11.5px; font-weight: 800; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted); margin: 12px 0 2px;
  }
  ul.gitems { list-style: none; margin: 0; padding: 0; }
  .gitems li {
    position: relative; padding: 7px 0 7px 16px; font-size: 14.5px;
  }
  .gitems li + li { border-top: 1px solid var(--line); }
  .gitems li::before {
    content: ""; position: absolute; left: 0; top: 0.95em;
    width: 7px; height: 7px; border-radius: 50%; background: var(--nc);
  }
  .gitems.crit li::before { background: var(--crit); }
  .card.critical { border-color: var(--crit); background: var(--crit-soft); }
  .card.critical .gitems li + li { border-top-color: color-mix(in srgb, var(--crit) 25%, transparent); }

  /* ── résultats par poste ── */
  .poste { padding: 11px 16px; border-top: 1px solid var(--line); }
  .poste:first-of-type { border-top: none; }
  .poste .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .poste .pname { font-weight: 600; font-size: 14.5px; min-width: 0; }
  .poste .ppct { font-weight: 800; font-size: 16px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .poste .pdet { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .poste .pbar { display: block; height: 7px; border-radius: 4px; background: var(--line); margin-top: 7px; overflow: hidden; }
  .poste .pfill { display: block; height: 100%; border-radius: 4px; }

  /* ── observations ── */
  .obs { border-left: 3px solid var(--accent); padding-left: 12px; margin: 10px 0 4px; }
  .obs ul { list-style: none; margin: 2px 0 0; padding: 0; }
  .obs li { padding: 4px 0; font-size: 14.5px; }

  /* ── plan d'action ── */
  .acts { display: flex; flex-direction: column; gap: 9px; padding: 8px 16px 14px; }
  .action-card {
    border: 1px solid var(--line); border-left: 4px solid var(--nc);
    border-radius: 10px; padding: 10px 12px; background: var(--card);
  }
  .action-card.crit { border-left-color: var(--crit); border-color: var(--crit); background: var(--crit-soft); }
  .chip {
    display: inline-block; font-size: 10.5px; font-weight: 800; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 2px 10px; border-radius: 999px;
    color: #fff; background: var(--nc); margin-bottom: 5px;
  }
  .action-card.crit .chip { background: var(--crit); }
  .action-card .what { font-weight: 600; font-size: 14.5px; }
  .action-card .where { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  /* ── signatures ── */
  .sig { display: flex; flex-wrap: wrap; gap: 20px; padding: 6px 16px 18px; }
  .sig div { flex: 1; min-width: 190px; }
  .sig .line { border-top: 1px solid var(--ink); margin-top: 44px; padding-top: 5px; font-size: 12px; color: var(--muted); }
  .gen { padding: 0 16px 14px; font-size: 11.5px; color: var(--muted); }

  /* ── barre d'actions ── */
  footer.toolbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: var(--paper); border-top: 1px solid var(--line);
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  }
  footer.toolbar .wrap { display: flex; gap: 8px; }
  .toolbar button, .toolbar a {
    flex: 1; text-align: center; padding: 12px 8px; border-radius: 10px;
    font: inherit; font-size: 14.5px; font-weight: 700; cursor: pointer; text-decoration: none;
    border: 1.5px solid var(--accent); background: var(--accent); color: #fff;
  }
  .toolbar .ghost { background: transparent; color: var(--accent); }
  button:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  #err { max-width: 640px; margin: 60px auto; text-align: center; color: var(--muted); padding: 0 16px; }
  #err a { color: var(--accent); }
</style>
</head>
<body>
<div id="err" hidden>
  <p>Aucune donnée de contrôle dans ce lien.</p>
  <p>Ouvre ce rapport depuis le bouton <b>📄 Rapport</b> de la <a href="./">checklist</a>.</p>
</div>
<main class="wrap" id="doc" hidden></main>
<footer class="toolbar no-print">
  <div class="wrap">
    <button id="btn-print">PDF</button>
    <button id="btn-copy" class="ghost">Copier le lien</button>
    <a id="btn-wa" class="ghost" target="_blank" rel="noopener">WhatsApp</a>
  </div>
</footer>

<script>
const SECTIONS = [
  { id: "arr", title: "Arrivée & salle",
    items: ["Extérieur propre : façade, vitres, entrée", "Salle propre : tables, sols, chaises", "Comptoir / caisse propre et rangé", "Première impression de l'équipe : présentable, accueillante"] },
  { id: "froid", title: "Froid : frigos & congélateur",
    items: ["Frigos entre 0 et 4 °C", "Congélateur à −18 °C", "Relevés de température tenus (feuille ou cahier)", "Aliments filmés ou couverts, jamais à nu", "Tout est étiqueté : produit + date (production ou ouverture)", "Cru en bas, cuit / prêt-à-manger en haut", "Décongélation au frigo, jamais à l'air ambiant ou dans l'évier", "Frigos propres : joints, étagères, pas de jus au fond"] },
  { id: "sec", title: "Stockage sec & réception",
    items: ["Rien posé directement au sol", "Produits entamés refermés / dans boîtes fermées", "Rotation FIFO : le plus ancien devant", "Aucun produit périmé (vérifier 5–10 DLC au hasard)", "Zone propre, pas de traces de nuisibles"] },
  { id: "prep", title: "Préparation & cuisson",
    items: ["Fiches techniques / recettes présentes au poste", "Planches et couteaux séparés cru / cuit ou lavés entre les deux", "Produits en cours d'utilisation couverts et datés", "Cuisson à cœur du poulet / viande hachée (74 °C ou bien cuit)", "Maintien au chaud à +63 °C minimum", "Goût et aspect conformes au standard Koulway", "Sauces maison : préparation datée, conservation au froid", "Plan de travail dégagé et nettoyé entre les tâches"] },
  { id: "frit", title: "Friture & huiles",
    items: ["Huile claire, pas noire ni mousseuse, odeur normale", "Fréquence de changement connue et suivie", "Huile filtrée régulièrement, bac propre", "Frites / produits frits tenus au chaud, pas refrits plusieurs fois"] },
  { id: "qte", title: "Quantités & portions",
    items: ["Grammages définis et connus de l'équipe", "Balance / dosettes / cuillères calibrées utilisées réellement", "Portions constantes d'un employé à l'autre", "Pertes et invendus notés quelque part", "Pas de surproduction en avance qui finit jetée"] },
  { id: "net", title: "Nettoyage, plonge & poubelles",
    items: ["Plan de nettoyage affiché (qui, quoi, quand)", "Sols et murs propres, y compris sous et derrière le matériel", "Hotte et filtres dégraissés", "Plonge organisée : sale et propre séparés", "Produits d'entretien étiquetés, stockés loin des aliments", "Poubelles avec couvercle, sac fermé, sorties régulièrement", "Zone poubelles extérieure propre", "Matériel en bon état : pas de plastique cassé, planches rayées noircies"] },
  { id: "hyg", title: "Hygiène du personnel",
    items: ["Tenue de travail propre (tablier, t-shirt)", "Cheveux couverts (charlotte, casquette, filet)", "Lavage des mains observé pendant la visite", "Lave-mains équipé : savon + essuie-mains jetable", "Pas de bijoux, montres, bagues en production", "Pas de téléphone manipulé en zone de production", "Blessures couvertes (pansement + gant)"] },
  { id: "org", title: "Organisation & traçabilité",
    items: ["Checklist ouverture / fermeture existante et utilisée", "Répartition claire des postes (qui fait quoi)", "Étiquettes des produits reçus conservées (traçabilité fournisseur)", "Procédure connue en cas de rupture de produit", "Commandes / inventaire : méthode claire, pas au feeling", "Communication avec le manager : consignes écrites ou orales ?"] },
  { id: "chef", title: "Entretien chef d'équipe", questions: true,
    items: ["« Raconte-moi une journée type : qui fait quoi, de l'ouverture à la fermeture ? »", "« Comment vous savez quelle quantité mettre dans chaque produit ? »", "« Comment vous faites quand un produit manque ? »", "« Pourquoi c'est organisé comme ça ici ? » (sur un point observé)", "« Qui nettoie quoi, et quand ? »", "« Depuis le départ du frère Abdelmajid, qu'est-ce qui a changé ? »", "« Qu'est-ce qui vous manque pour bien travailler ? »"] }
];
const GRADE_LABELS = {
  A: "Excellent — standard tenu",
  B: "Bon — quelques points à corriger",
  C: "Insuffisant — plan d'action nécessaire",
  D: "Alerte — reprise en main immédiate"
};

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function card(title) {
  const c = el("section", "card");
  if (title) {
    const h = el("div", "sec-head");
    h.appendChild(el("h2", null, title));
    c.appendChild(h);
  }
  return c;
}

// Regroupe une liste de {sec, label} par poste, une pastille par écart.
function renderGroups(container, list, critical) {
  const m = new Map();
  list.forEach(x => {
    if (!m.has(x.sec)) m.set(x.sec, []);
    m.get(x.sec).push(x.label);
  });
  const g = el("div", "glist");
  m.forEach((items, sec) => {
    g.appendChild(el("div", "gname", sec));
    const ul = el("ul", "gitems" + (critical ? " crit" : ""));
    items.forEach(t => ul.appendChild(el("li", null, t)));
    g.appendChild(ul);
  });
  container.appendChild(g);
}

// Nettoie les notes tapées en vrac : une puce par ligne, majuscule, point final.
function tidy(text) {
  return (text || "").split(/\n+/).map(s => s.trim()).filter(Boolean).map(s => {
    s = s.replace(/^[-–•*]\s*/, "").replace(/\s+/g, " ");
    s = s.charAt(0).toUpperCase() + s.slice(1);
    if (!/[.!?…]$/.test(s)) s += ".";
    return s;
  });
}

let data = null;
try {
  const h = location.hash.slice(1);
  if (h) data = JSON.parse(decodeURIComponent(escape(atob(h))));
} catch (e) { data = null; }

if (!data || !data.states) {
  document.getElementById("err").hidden = false;
} else {
  render(data);
}

function render(d) {
  const states = d.states || {}, notes = d.notes || {};
  let evalTot = 0, okTot = 0, ncTot = 0, critTot = 0, scoreableTot = 0;
  const perSec = [], critL = [], ncL = [];
  SECTIONS.forEach(sec => {
    if (sec.questions) return;
    let e = 0, o = 0;
    sec.items.forEach((label, i) => {
      const v = states[sec.id + "-" + i] || 0;
      scoreableTot++;
      if (v) { e++; evalTot++; }
      if (v === 1) { o++; okTot++; }
      if (v === 2) { ncTot++; ncL.push({ sec: sec.title, label: label }); }
      if (v === 3) { critTot++; critL.push({ sec: sec.title, label: label }); }
    });
    perSec.push({ sec: sec, e: e, o: o, pct: e ? Math.round(o / e * 100) : null });
  });
  let score = null, grade = null;
  if (evalTot > 0) {
    score = Math.max(0, Math.round(okTot / evalTot * 100 - critTot * 5));
    grade = score >= 90 ? "A" : score >= 80 ? "B" : score >= 65 ? "C" : "D";
    if (critTot > 0 && (grade === "A" || grade === "B")) grade = "C";
  }

  const doc = document.getElementById("doc");
  doc.hidden = false;

  // ── Carte de tête : titre + score ──
  const hero = el("section", "card");
  const hh = el("div", "sec-head");
  hh.appendChild(el("div", "eyebrow", "Koulway · Contrôle qualité & hygiène"));
  hh.appendChild(el("h1", null, "Rapport de contrôle cuisine"));
  const dt = d.ts ? new Date(d.ts) : new Date();
  const dateStr = dt.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) +
    " à " + dt.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
  hh.appendChild(el("p", "meta", (d.site ? d.site + " — " : "") + "contrôle inopiné du " + dateStr));
  hero.appendChild(hh);
  const sr = el("div", "score-row");
  const num = el("div", "num", score === null ? "—" : String(score));
  num.appendChild(el("small", null, "/100"));
  sr.appendChild(num);
  const side = el("div");
  side.appendChild(el("span", "grade" + (grade ? " g-" + grade.toLowerCase() : ""), grade || "—"));
  side.appendChild(el("div", "glabel", grade ? GRADE_LABELS[grade] : "Aucun point évalué."));
  sr.appendChild(side);
  hero.appendChild(sr);
  if (evalTot > 0) {
    const dist = el("div", "dist");
    [[okTot, "var(--ok)"], [ncTot, "var(--nc)"], [critTot, "var(--crit)"]].forEach(sg => {
      if (!sg[0]) return;
      const s = el("span");
      s.style.width = (sg[0] / evalTot * 100) + "%";
      s.style.background = sg[1];
      dist.appendChild(s);
    });
    hero.appendChild(dist);
  }
  const st = el("div", "stats");
  st.appendChild(el("span", null, evalTot + "/" + scoreableTot + " évalués"));
  st.appendChild(el("span", "s-ok", okTot + " conformes"));
  st.appendChild(el("span", "s-nc", ncTot + " non conf."));
  st.appendChild(el("span", "s-crit", critTot + " critique" + (critTot > 1 ? "s" : "")));
  hero.appendChild(st);
  doc.appendChild(hero);

  // ── 1. Synthèse ──
  const syn = card("1 · Synthèse du contrôleur");
  const sp = el("div", "pad");
  sp.appendChild(el("p", null, "Sur les " + evalTot + " points de contrôle évalués, " + okTot +
    " sont conformes, soit " + (evalTot ? Math.round(okTot / evalTot * 100) : 0) + " %."));
  if (critTot > 0) {
    sp.appendChild(el("p", null, critTot + " non-conformité" + (critTot > 1 ? "s" : "") +
      " critique" + (critTot > 1 ? "s" : "") + " relevée" + (critTot > 1 ? "s" : "") +
      " — correction exigée sans délai."));
  } else {
    sp.appendChild(el("p", null, "Aucune non-conformité critique relevée."));
  }
  const strong = perSec.filter(s => s.pct !== null && s.pct >= 90).map(s => s.sec.title);
  const weak = perSec.filter(s => s.pct !== null && s.pct < 65).map(s => s.sec.title);
  if (strong.length) sp.appendChild(el("p", "kv good", "✓ Postes maîtrisés : " + strong.join(" · ")));
  if (weak.length) sp.appendChild(el("p", "kv warn", "⚠ Postes prioritaires : " + weak.join(" · ")));
  sp.appendChild(el("p", null,
    grade === "A" ? "Le niveau constaté est à maintenir." :
    grade === "B" ? "Le niveau est correct ; les écarts listés ci-dessous restent à corriger." :
    "Un plan d'action est établi ci-dessous et fera l'objet d'une contre-visite."));
  syn.appendChild(sp);
  doc.appendChild(syn);

  // ── 2. Résultats par poste (graphique) ──
  const res = card("2 · Résultats par poste");
  perSec.forEach(s => {
    const po = el("div", "poste");
    const top = el("div", "top");
    top.appendChild(el("span", "pname", s.sec.title));
    const pct = el("span", "ppct", s.pct === null ? "—" : s.pct + " %");
    if (s.pct !== null) pct.style.color = s.pct >= 90 ? "var(--ok)" : s.pct >= 65 ? "var(--nc)" : "var(--crit)";
    top.appendChild(pct);
    po.appendChild(top);
    po.appendChild(el("div", "pdet", s.pct === null ? "non évalué" : s.o + "/" + s.e + " points conformes"));
    const bar = el("span", "pbar");
    const fill = el("span", "pfill");
    if (s.pct !== null) {
      fill.style.width = s.pct + "%";
      fill.style.background = s.pct >= 90 ? "var(--ok)" : s.pct >= 65 ? "var(--nc)" : "var(--crit)";
    }
    bar.appendChild(fill);
    po.appendChild(bar);
    res.appendChild(po);
  });
  doc.appendChild(res);

  // ── 3. Points critiques ──
  if (critL.length) {
    const cc = card("3 · Points critiques — correction immédiate");
    cc.className = "card critical";
    renderGroups(cc, critL, true);
    doc.appendChild(cc);
  } else {
    const cc = card("3 · Points critiques");
    const p = el("div", "pad");
    p.appendChild(el("p", null, "Aucun point critique relevé lors de cette visite."));
    cc.appendChild(p);
    doc.appendChild(cc);
  }

  // ── 4. Non-conformités ──
  const nc = card("4 · Non-conformités relevées");
  if (ncL.length) {
    renderGroups(nc, ncL, false);
  } else {
    const p = el("div", "pad");
    p.appendChild(el("p", null, "Aucune non-conformité simple relevée."));
    nc.appendChild(p);
  }
  doc.appendChild(nc);

  // ── 5. Observations du contrôleur ──
  const hasNotes = perSec.some(s => tidy(notes[s.sec.id]).length);
  if (hasNotes) {
    const ob = card("5 · Observations du contrôleur");
    const op = el("div", "pad");
    perSec.forEach(s => {
      const items = tidy(notes[s.sec.id]);
      if (!items.length) return;
      const blk = el("div", "obs");
      blk.appendChild(el("div", "gname", s.sec.title));
      const ul = el("ul");
      items.forEach(t => ul.appendChild(el("li", null, "– " + t)));
      blk.appendChild(ul);
      op.appendChild(blk);
    });
    ob.appendChild(op);
    doc.appendChild(ob);
  }

  // ── 6. Entretien ──
  const chef = SECTIONS.find(s => s.questions);
  const en = card("6 · Entretien avec le chef d'équipe");
  const ep = el("div", "pad");
  const asked = chef.items.filter((q, i) => states[chef.id + "-" + i] === 1).length;
  ep.appendChild(el("p", null, asked ? asked + "/" + chef.items.length +
    " questions de l'entretien ont été posées." :
    "L'entretien n'a pas pu être mené lors de cette visite."));
  const chefNotes = tidy(notes[chef.id]);
  if (chefNotes.length) {
    const blk = el("div", "obs");
    blk.appendChild(el("div", "gname", "Éléments recueillis"));
    const ul = el("ul");
    chefNotes.forEach(t => ul.appendChild(el("li", null, "– " + t)));
    blk.appendChild(ul);
    ep.appendChild(blk);
  }
  en.appendChild(ep);
  doc.appendChild(en);

  // ── 7. Plan d'action ──
  const pa = card("7 · Plan d'action");
  if (critL.length || ncL.length) {
    const al = el("div", "acts");
    critL.forEach(c => {
      const li = el("div", "action-card crit");
      li.appendChild(el("span", "chip", "Immédiat"));
      li.appendChild(el("div", "what", c.label));
      li.appendChild(el("div", "where", c.sec));
      al.appendChild(li);
    });
    ncL.forEach(c => {
      const li = el("div", "action-card");
      li.appendChild(el("span", "chip", "Sous 7 jours"));
      li.appendChild(el("div", "what", c.label));
      li.appendChild(el("div", "where", c.sec));
      al.appendChild(li);
    });
    pa.appendChild(al);
    const p = el("div", "pad");
    p.appendChild(el("p", null, "Responsable de la levée des écarts : le manager du site. Les points critiques signalés sur place devaient être corrigés avant la fin du service. Une contre-visite inopinée vérifiera la levée de chaque écart."));
    pa.appendChild(p);
  } else {
    const p = el("div", "pad");
    p.appendChild(el("p", null, "Aucun écart à traiter. Le niveau constaté est à maintenir ; une visite de suivi confirmera la stabilité des bonnes pratiques."));
    pa.appendChild(p);
  }
  doc.appendChild(pa);

  // ── Signatures ──
  const sg = card(null);
  const sig = el("div", "sig");
  const s1 = el("div"); s1.appendChild(el("div", "line", "Le contrôleur — au nom de la direction"));
  const s2 = el("div"); s2.appendChild(el("div", "line", "Pris connaissance — le manager du site"));
  sig.appendChild(s1); sig.appendChild(s2);
  sg.appendChild(sig);
  sg.appendChild(el("p", "gen", "Rapport généré automatiquement à partir de la checklist de contrôle Koulway. Les photos prises pendant la visite complètent ce rapport."));
  doc.appendChild(sg);

  document.title = "Rapport de contrôle — " + (d.site || "Koulway");
}

document.getElementById("btn-print").addEventListener("click", () => window.print());
document.getElementById("btn-copy").addEventListener("click", function () {
  const b = this;
  navigator.clipboard.writeText(location.href).then(() => {
    b.textContent = "Lien copié ✓";
    setTimeout(() => { b.textContent = "Copier le lien"; }, 1800);
  });
});
document.getElementById("btn-wa").href = "https://wa.me/?text=" +
  encodeURIComponent("Rapport de contrôle cuisine" + (data && data.site ? " — " + data.site : "") + " :\n" + location.href);
</script>
</body>
</html>
